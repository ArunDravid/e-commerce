<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – NexGen Audio & Tech</title>
    <meta name="description" content="Securely checkout your order at NexGen.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <!-- PayPal SDK (sandbox mode) -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
</head>
<body>
    <div id="toast" class="toast hidden"><span id="toast-message"></span></div>

    <!-- Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><span class="logo-text">NEXGEN</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#products">Shop</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="checkout-page">
            <!-- Shipping Details -->
            <section class="checkout-section">
                <h2><i data-lucide="map-pin"></i> Shipping Details</h2>
                <form id="checkout-form" class="checkout-fields">
                    <div class="form-group">
                        <label for="c-fname">First Name</label>
                        <div class="input-wrapper">
                            <i data-lucide="user"></i>
                            <input type="text" id="c-fname" placeholder="John" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="c-lname">Last Name</label>
                        <div class="input-wrapper">
                            <i data-lucide="user"></i>
                            <input type="text" id="c-lname" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label for="c-email">Email</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail"></i>
                            <input type="email" id="c-email" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label for="c-address">Street Address</label>
                        <div class="input-wrapper">
                            <i data-lucide="home"></i>
                            <input type="text" id="c-address" placeholder="123 Main Street" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="c-city">City</label>
                        <div class="input-wrapper">
                            <i data-lucide="building-2"></i>
                            <input type="text" id="c-city" placeholder="Mumbai" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="c-zip">Zip / Postal Code</label>
                        <div class="input-wrapper">
                            <i data-lucide="hash"></i>
                            <input type="text" id="c-zip" placeholder="400001" required>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label for="c-country">Country</label>
                        <div class="input-wrapper">
                            <i data-lucide="globe"></i>
                            <input type="text" id="c-country" placeholder="India" required>
                        </div>
                    </div>
                </form>
            </section>

            <!-- Order Summary + Payment -->
            <div style="display:flex;flex-direction:column;gap:1.5rem;">
                <section class="checkout-section">
                    <h2><i data-lucide="shopping-bag"></i> Order Summary</h2>
                    <div id="checkout-items" class="checkout-order-items">
                        <p style="color:var(--text-muted);">Loading...</p>
                    </div>
                    <div class="order-total-row"><span>Subtotal</span><span id="checkout-subtotal">$0.00</span></div>
                    <div class="order-total-row"><span>Shipping</span><span>Free</span></div>
                    <div class="order-total-row grand-total"><span>Total</span><span id="checkout-total">$0.00</span></div>
                </section>

                <section class="checkout-section">
                    <h2><i data-lucide="credit-card"></i> Payment</h2>
                    <div class="paypal-btn-container">
                        <div id="paypal-button-container"></div>
                        <p id="paypal-empty-msg" style="color:var(--text-muted);font-size:0.9rem;">Your cart is empty. <a href="index.html">Shop now</a></p>
                    </div>
                    <div class="secure-badge">
                        <i data-lucide="shield-check" style="width:14px;height:14px;"></i>
                        Secured by PayPal · SSL Encrypted
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="footer"><p>&copy; 2026 NexGen Tech. All rights reserved.</p></footer>

    <script>
        lucide.createIcons();
        const API_BASE = 'http://localhost:3005/api';
        let cartItems = [];
        let totalAmount = 0;

        // Auth Check
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            toast.style.backgroundColor = isError ? 'var(--danger)' : 'var(--success)';
            toast.classList.remove('hidden');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.classList.add('hidden'), 400); }, 4000);
        }

        async function loadCart() {
            try {
                const res = await fetch(`${API_BASE}/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                    return;
                }
                cartItems = await res.json();
                renderOrderSummary();
                initPayPal();
            } catch (e) {
                document.getElementById('checkout-items').innerHTML = '<p style="color:var(--danger)">Failed to load cart.</p>';
            }
        }

        function renderOrderSummary() {
            const container = document.getElementById('checkout-items');
            const paypalMsg = document.getElementById('paypal-empty-msg');
            
            if (!cartItems.length) {
                container.innerHTML = '<p style="color:var(--text-muted)">Your cart is empty.</p>';
                paypalMsg.style.display = 'block';
                document.getElementById('paypal-button-container').style.display = 'none';
                return;
            }

            paypalMsg.style.display = 'none';

            totalAmount = cartItems.reduce((sum, item) => sum + (Number(item.price) * item.quantity), 0);
            document.getElementById('checkout-subtotal').textContent = `$${totalAmount.toFixed(2)}`;
            document.getElementById('checkout-total').textContent = `$${totalAmount.toFixed(2)}`;

            container.innerHTML = cartItems.map(item => `
                <div class="checkout-item">
                    <img src="${item.image_url}" alt="${item.name}">
                    <div class="checkout-item-info">
                        <div class="checkout-item-name">${item.name}</div>
                        <div class="checkout-item-qty">Qty: ${item.quantity}</div>
                    </div>
                    <div class="checkout-item-price">$${(Number(item.price) * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');
        }

        function initPayPal() {
            if (!cartItems.length) return;

            if (document.getElementById('paypal-button-container').children.length > 0) return;

            paypal.Buttons({
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{
                            description: 'NexGen Tech Order',
                            amount: {
                                currency_code: 'USD',
                                value: totalAmount.toFixed(2),
                                breakdown: {
                                    item_total: { currency_code: 'USD', value: totalAmount.toFixed(2) }
                                }
                            },
                            items: cartItems.map(item => ({
                                name: item.name,
                                unit_amount: { currency_code: 'USD', value: Number(item.price).toFixed(2) },
                                quantity: String(item.quantity)
                            }))
                        }]
                    });
                },
                onApprove: async (data, actions) => {
                    const order = await actions.order.capture();
                    showToast(`Payment successful! Order ID: ${order.id}`);
                    // Clear cart
                    for (const item of cartItems) {
                        await fetch(`${API_BASE}/cart/${item.cart_id}`, { 
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                    }
                    setTimeout(() => { window.location.href = 'index.html'; }, 3000);
                },
                onError: (err) => {
                    console.error(err);
                    showToast('Payment failed. Please try again.', true);
                }
            }).render('#paypal-button-container');
        }

        loadCart();
    </script>
</body>
</html>
